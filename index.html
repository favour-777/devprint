<!-- Made for RHDC - Favour -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevPrint - Your Developer Fingerprint</title>
  <meta name="description" content="Turn any GitHub profile into a clear developer fingerprint. Languages, activity, archetypes, and a recruiter-ready summary in seconds.">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DevPrint">
  <link rel="icon" type="image/png" sizes="32x32" href="Assets/icons/web/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="Assets/icons/web/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.github.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header>
    <div class="logo">
      <svg width="26" height="30" viewBox="60 65 392 440" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#00f0a0" stroke-linecap="round" fill="none">
          <path d="M72,500 Q62,70 256,70 Q450,70 450,500"  stroke-width="33" opacity="0.18"/>
          <path d="M116,500 Q108,114 256,114 Q404,114 404,500" stroke-width="33" opacity="0.32"/>
          <path d="M160,500 Q152,158 256,158 Q360,158 360,500" stroke-width="33" opacity="0.48"/>
          <path d="M204,500 Q196,200 256,200 Q316,200 316,500" stroke-width="33" opacity="0.64"/>
          <path d="M236,500 Q230,234 256,234 Q282,234 282,500" stroke-width="33" opacity="0.82"/>
          <path d="M250,500 Q246,258 256,258 Q266,258 266,500" stroke-width="33" opacity="1"/>
        </g>
      </svg>
      <span class="logo-text">Dev<span>Print</span></span>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
      <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </header>

  <section class="hero">
    <h1>Every developer leaves a <em>fingerprint</em>.</h1>
    <p>DevPrint analyzes repos, bios, READMEs, languages, activity, and more from GitHub profiles to generate clean developer reports.</p>

    <div class="search-wrap">
      <div class="search-box solid-panel">
        <span class="search-prefix" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
          </svg>
        </span>
        <input type="text" id="usernameInput" placeholder="Enter a username" autocomplete="off" spellcheck="false" />
        <button class="search-btn" id="analyzeBtn" onclick="analyze()">Analyze</button>
      </div>
    </div>
    <div class="history-wrap" id="historyWrap"></div>
  </section>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p id="loadingText">Reading profile...</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <section id="results"></section>
  <script src="/app.js" defer></script>
</body>
</html>
